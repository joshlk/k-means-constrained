name: Build & Test

on:
    schedule:
      - cron: '0 1 * * 4' # Runs every Thursday at 1 AM (UTC)
    pull_request:
    push:
      branches:
        - master
    workflow_dispatch:

concurrency:
    group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

jobs:
  build_wheels:
    name: ${{ matrix.os }}-${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # macos-15-intel is an intel runner, macos-latest is apple silicon
        # windows-11-arm is currently not supported by the dependencies
        os: [ubuntu-latest, ubuntu-24.04-arm, windows-latest, macos-15-intel, macos-latest]
        python: [cp310, cp311, cp312, cp313, cp314]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4
      - name: Build and test wheels
        uses: pypa/cibuildwheel@v3.3.1
        env:
            # Build
            # NOTE: build dependencies are defined in pyproject.toml (including numpy version)
            CIBW_BUILD_FRONTEND: "build"
            CIBW_ARCHS: native # Build only for the native architecture of the build machine
            CIBW_BUILD: "${{ matrix.python }}*" # Build only for the specified Python version
            # Skip musllinux (no ortools wheels). Free-threaded (cp314t) wheels are
            # built on Linux only: ortools currently publishes free-threaded wheels
            # for manylinux but not macOS/Windows. cp313t is not built (experimental;
            # removed entirely in cibuildwheel >= 4). Remove the OS condition below
            # once ortools ships free-threaded wheels for macOS/Windows.
            CIBW_SKIP: "*musllinux* ${{ runner.os != 'Linux' && 'cp3*t-*' || '' }}"

            # Test
            CIBW_BEFORE_TEST: "python -m pip install --upgrade pip && python -m pip install -r requirements-dev.txt && python -m pip list"
            CIBW_TEST_COMMAND: "pytest {project}/tests"
      - uses: actions/upload-artifact@v4
        with:
          path: ./wheelhouse/*.whl
          name: ${{ matrix.os }}-${{ matrix.python }}
  merge:
    runs-on: ubuntu-latest
    needs: build_wheels
    steps:
      - uses: actions/upload-artifact/merge@v4
        with:
            name: wheels
            delete-merged: true
